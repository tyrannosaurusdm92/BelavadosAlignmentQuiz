<!-- /components/progress-bar.html -->

<div class="bv-progress-shell" id="bv-progress-shell">

    <!-- TOP INFO -->
    <div class="bv-progress-top">

        <div class="bv-progress-mode-wrapper">
            <span class="bv-progress-mode-label">MODE</span>

            <div class="bv-progress-mode" id="quiz-mode-display">
                SHORT PATH
            </div>
        </div>

        <div class="bv-progress-question-wrapper">

            <div class="bv-progress-question-text">
                Question
                <span id="current-question-number">1</span>
                /
                <span id="total-question-number">20</span>
            </div>

            <div class="bv-progress-percent" id="progress-percent">
                5%
            </div>

        </div>

    </div>

    <!-- MAIN BAR -->
    <div
        class="bv-progress-bar-outer"
        id="bv-progress-bar"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
        aria-label="Quiz progress"
    >

        <!-- DECORATIVE METAL FRAME -->
        <div class="bv-progress-metal-overlay"></div>

        <!-- FILL -->
        <div class="bv-progress-bar-inner" id="progress-bar-inner">

            <!-- MOVING GLOW -->
            <div class="bv-progress-energy"></div>

        </div>

    </div>

    <!-- STEP INDICATORS -->
    <div class="bv-progress-steps" id="bv-progress-steps"></div>

    <!-- LOWER STATUS -->
    <div class="bv-progress-status">

        <div class="bv-progress-status-left">
            Alignment Calibration Active
        </div>

        <div class="bv-progress-status-right" id="progress-stage-name">
            Character Foundation
        </div>

    </div>

</div>

<script>
"use strict";

/*
=========================================================
BELAVADOS PROGRESS BAR SYSTEM
=========================================================
*/

const BelavadosProgress = {

    currentQuestion: 1,
    totalQuestions: 20,
    quizMode: "short",

    stageNamesShort: [
        "Character Foundation",
        "Moral Instinct",
        "Social Behavior",
        "Combat Philosophy",
        "Final Evaluation"
    ],

    stageNamesDeep: [
        "Identity Mapping",
        "Moral Analysis",
        "Behavioral Tendencies",
        "Ideological Conflict",
        "Psychological Profile",
        "Reputation Synthesis",
        "Final Evaluation"
    ],

    init(config = {}) {

        this.currentQuestion = config.currentQuestion ?? 1;
        this.totalQuestions = config.totalQuestions ?? 20;
        this.quizMode = config.quizMode ?? "short";

        this.currentQuestion = Math.min(
            Math.max(1, this.currentQuestion),
            this.totalQuestions
        );

        this.render();
        this.update();

    },

    render() {

        const stepContainer = document.getElementById("bv-progress-steps");
        if (!stepContainer) return;

        stepContainer.innerHTML = "";

        const totalSteps = this.quizMode === "deep" ? 7 : 5;

        for (let i = 0; i < totalSteps; i++) {

            const step = document.createElement("div");
            step.className = "bv-progress-step";

            step.innerHTML = `
                <div class="bv-progress-step-line"></div>
                <div class="bv-progress-step-core"></div>
            `;

            stepContainer.appendChild(step);
        }

    },

    update(currentQuestion = null) {

        if (currentQuestion !== null) {
            this.currentQuestion = currentQuestion;
        }

        const safeTotal = Math.max(1, this.totalQuestions);

        const percent = Math.max(
            0,
            Math.min(
                100,
                Math.round(((this.currentQuestion - 1) / safeTotal) * 100)
            )
        );

        /*
        UPDATE NUMBERS
        */
        document.getElementById("current-question-number").textContent =
            this.currentQuestion;

        document.getElementById("total-question-number").textContent =
            this.totalQuestions;

        document.getElementById("progress-percent").textContent =
            `${percent}%`;

        document.getElementById("quiz-mode-display").textContent =
            this.quizMode === "deep" ? "DEEP ANALYSIS" : "SHORT PATH";

        /*
        UPDATE BAR
        */
        const progressBar = document.getElementById("progress-bar-inner");
        const progressOuter = document.getElementById("bv-progress-bar");

        if (progressBar) {
            progressBar.style.width = `${percent}%`;
        }

        if (progressOuter) {
            progressOuter.setAttribute("aria-valuenow", percent);
        }

        /*
        UPDATE STAGE NAME
        */
        const stageEl = document.getElementById("progress-stage-name");

        const stages =
            this.quizMode === "deep"
                ? this.stageNamesDeep
                : this.stageNamesShort;

        const stageIndex = Math.min(
            stages.length - 1,
            Math.floor(
                ((this.currentQuestion - 1) / safeTotal) * stages.length
            )
        );

        if (stageEl) {
            stageEl.textContent = stages[stageIndex];
        }

        /*
        UPDATE STEP INDICATORS
        */
        const steps = document.querySelectorAll(".bv-progress-step");

        const progressIndex = Math.floor(
            ((this.currentQuestion - 1) / safeTotal) * steps.length
        );

        steps.forEach((step, index) => {

            step.classList.remove("active", "completed");

            if (index < progressIndex) {
                step.classList.add("completed");
            } else if (index === progressIndex) {
                step.classList.add("active");
            }

        });

    },

    next() {
        if (this.currentQuestion < this.totalQuestions) {
            this.currentQuestion++;
            this.update();
        }
    },

    previous() {
        if (this.currentQuestion > 1) {
            this.currentQuestion--;
            this.update();
        }
    },

    setMode(mode, totalQuestions) {

        const validModes = ["short", "deep"];
        this.quizMode = validModes.includes(mode) ? mode : "short";

        if (Number.isInteger(totalQuestions) && totalQuestions > 0) {
            this.totalQuestions = totalQuestions;
        }

        this.currentQuestion = Math.min(
            this.currentQuestion,
            this.totalQuestions
        );

        this.render();
        this.update();
    }

};

/*
=========================================================
AUTO INITIALIZE
=========================================================
*/

document.addEventListener("DOMContentLoaded", () => {
    BelavadosProgress.init({
        currentQuestion: 1,
        totalQuestions: 20,
        quizMode: "short"
    });
});
</script>
