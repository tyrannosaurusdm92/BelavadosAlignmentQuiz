<!-- /components/navigation.html -->

<nav class="bv-navigation-shell">

    <!-- LEFT SECTION -->
    <div class="bv-navigation-left">

        <button
            id="nav-home-btn"
            class="bv-nav-button bv-nav-home"
            type="button"
        >
            <span class="bv-nav-icon">⌂</span>
            <span class="bv-nav-text">Home Page</span>
        </button>

        <button
            id="nav-previous-btn"
            class="bv-nav-button bv-nav-secondary"
            type="button"
        >
            <span class="bv-nav-icon">←</span>
            <span class="bv-nav-text">Previous Page</span>
        </button>

    </div>

    <!-- CENTER STATUS -->
    <div class="bv-navigation-center">

        <div class="bv-nav-status-core">

            <div class="bv-nav-status-top">

                <span class="bv-nav-status-label">
                    ALIGNMENT ANALYSIS
                </span>

                <span
                    class="bv-nav-mode"
                    id="nav-current-mode"
                >
                    SHORT PATH
                </span>

            </div>

            <div class="bv-nav-status-bottom">

                <div class="bv-nav-stage">
                    Current Stage:
                    <span id="nav-current-stage">
                        Character Foundation
                    </span>
                </div>

            </div>

        </div>

    </div>

    <!-- RIGHT SECTION -->
    <div class="bv-navigation-right">

        <button
            id="nav-skip-btn"
            class="bv-nav-button bv-nav-warning"
            type="button"
        >
            <span class="bv-nav-icon">⟳</span>
            <span class="bv-nav-text">Skip</span>
        </button>

        <button
            id="nav-next-btn"
            class="bv-nav-button bv-nav-primary"
            type="button"
        >
            <span class="bv-nav-text">Next Question</span>
            <span class="bv-nav-icon">→</span>
        </button>

        <button
            id="nav-finish-btn"
            class="bv-nav-button bv-nav-finish hidden"
            type="button"
        >
            <span class="bv-nav-text">Reveal Alignment</span>
            <span class="bv-nav-icon">⚔</span>
        </button>

    </div>

</nav>

<script>

    /*
    =========================================================
    BELAVADÖS NAVIGATION SYSTEM
    =========================================================
    */

    const BelavadosNavigation = {

        currentQuestion: 1,
        totalQuestions: 20,
        quizMode: "short",

        stageNamesShort: [
            "Character Foundation",
            "Moral Instinct",
            "Social Behavior",
            "Combat Philosophy",
            "Final Evaluation"
        ],

        stageNamesDeep: [
            "Identity Mapping",
            "Moral Analysis",
            "Behavioral Tendencies",
            "Ideological Conflict",
            "Psychological Profile",
            "Reputation Synthesis",
            "Final Evaluation"
        ],

        init(config = {}) {

            this.currentQuestion =
                config.currentQuestion || 1;

            this.totalQuestions =
                config.totalQuestions || 20;

            this.quizMode =
                config.quizMode || "short";

            this.bindEvents();
            this.update();

        },

        bindEvents() {

            /*
            =========================================================
            HOME BUTTON
            =========================================================
            */

            const homeBtn =
                document.getElementById("nav-home-btn");

            if (homeBtn) {

                homeBtn.addEventListener("click", () => {

                    const confirmLeave = confirm(
                        "Return to homepage and restart alignment selection?"
                    );

                    if (!confirmLeave) return;

                    /*
                    =================================================
                    OPTIONAL ROUTER SUPPORT
                    =================================================
                    */

                    if (
                        window.Router &&
                        typeof Router.goTo === "function"
                    ) {

                        Router.goTo("homepage");

                    } else {

                        window.location.href = "homepage.html";

                    }

                });

            }

            /*
            =========================================================
            PREVIOUS BUTTON
            =========================================================
            */

            const previousBtn =
                document.getElementById("nav-previous-btn");

            if (previousBtn) {

                previousBtn.addEventListener("click", () => {

                    this.previous();

                });

            }

            /*
            =========================================================
            NEXT BUTTON
            =========================================================
            */

            const nextBtn =
                document.getElementById("nav-next-btn");

            if (nextBtn) {

                nextBtn.addEventListener("click", () => {

                    this.next();

                });

            }

            /*
            =========================================================
            SKIP BUTTON
            =========================================================
            */

            const skipBtn =
                document.getElementById("nav-skip-btn");

            if (skipBtn) {

                skipBtn.addEventListener("click", () => {

                    this.skip();

                });

            }

            /*
            =========================================================
            FINISH BUTTON
            =========================================================
            */

            const finishBtn =
                document.getElementById("nav-finish-btn");

            if (finishBtn) {

                finishBtn.addEventListener("click", () => {

                    this.finishQuiz();

                });

            }

        },

        update(currentQuestion = null) {

            if (currentQuestion !== null) {

                this.currentQuestion =
                    currentQuestion;

            }

            /*
            =========================================================
            UPDATE MODE
            =========================================================
            */

            const modeEl =
                document.getElementById("nav-current-mode");

            if (modeEl) {

                modeEl.textContent =
                    this.quizMode === "deep"
                        ? "DEEP ANALYSIS"
                        : "SHORT PATH";

            }

            /*
            =========================================================
            UPDATE STAGE
            =========================================================
            */

            const stages =
                this.quizMode === "deep"
                    ? this.stageNamesDeep
                    : this.stageNamesShort;

            const stageIndex = Math.min(
                stages.length - 1,
                Math.floor(
                    ((this.currentQuestion - 1)
                    / this.totalQuestions)
                    * stages.length
                )
            );

            const stageEl =
                document.getElementById("nav-current-stage");

            if (stageEl) {

                stageEl.textContent =
                    stages[stageIndex];

            }

            /*
            =========================================================
            BUTTON VISIBILITY
            =========================================================
            */

            const previousBtn =
                document.getElementById("nav-previous-btn");

            const nextBtn =
                document.getElementById("nav-next-btn");

            const finishBtn =
                document.getElementById("nav-finish-btn");

            /*
            =========================================================
            PREVIOUS BUTTON
            =========================================================
            */

            if (previousBtn) {

                previousBtn.disabled =
                    this.currentQuestion <= 1;

            }

            /*
            =========================================================
            LAST QUESTION LOGIC
            =========================================================
            */

            const isFinalQuestion =
                this.currentQuestion >=
                this.totalQuestions;

            if (isFinalQuestion) {

                if (nextBtn) {
                    nextBtn.classList.add("hidden");
                }

                if (finishBtn) {
                    finishBtn.classList.remove("hidden");
                }

            } else {

                if (nextBtn) {
                    nextBtn.classList.remove("hidden");
                }

                if (finishBtn) {
                    finishBtn.classList.add("hidden");
                }

            }

            /*
            =========================================================
            UPDATE PROGRESS BAR
            =========================================================
            */

            if (
                window.BelavadosProgress &&
                typeof BelavadosProgress.update ===
                "function"
            ) {

                BelavadosProgress.update(
                    this.currentQuestion
                );

            }

        },

        next() {

            if (
                this.currentQuestion <
                this.totalQuestions
            ) {

                this.currentQuestion++;

                this.update();

                /*
                =============================================
                OPTIONAL QUESTION SYSTEM
                =============================================
                */

                if (
                    window.QuestionSystem &&
                    typeof QuestionSystem.loadQuestion
                    === "function"
                ) {

                    QuestionSystem.loadQuestion(
                        this.currentQuestion
                    );

                }

            }

        },

        previous() {

            if (this.currentQuestion > 1) {

                this.currentQuestion--;

                this.update();

                /*
                =============================================
                OPTIONAL QUESTION SYSTEM
                =============================================
                */

                if (
                    window.QuestionSystem &&
                    typeof QuestionSystem.loadQuestion
                    === "function"
                ) {

                    QuestionSystem.loadQuestion(
                        this.currentQuestion
                    );

                }

            } else {

                /*
                =============================================
                RETURN TO HOMEPAGE
                =============================================
                */

                const goHome = confirm(
                    "Return to homepage and choose another quiz type?"
                );

                if (!goHome) return;

                if (
                    window.Router &&
                    typeof Router.goTo === "function"
                ) {

                    Router.goTo("homepage");

                } else {

                    window.location.href =
                        "homepage.html";

                }

            }

        },

        skip() {

            const confirmSkip = confirm(
                "Skip this question?"
            );

            if (!confirmSkip) return;

            this.next();

        },

        finishQuiz() {

            /*
            =========================================================
            SAVE RESULTS
            =========================================================
            */

            if (
                window.StorageSystem &&
                typeof StorageSystem.save
                === "function"
            ) {

                StorageSystem.save();

            }

            /*
            =========================================================
            ROUTE TO RESULTS
            =========================================================
            */

            if (
                window.Router &&
                typeof Router.goTo === "function"
            ) {

                Router.goTo("results");

            } else {

                window.location.href =
                    "result-card.html";

            }

        },

        setMode(mode, totalQuestions) {

            this.quizMode = mode;

            if (totalQuestions) {

                this.totalQuestions =
                    totalQuestions;

            }

            this.currentQuestion = 1;

            this.update();

        }

    };

    /*
    =========================================================
    AUTO INITIALIZE
    =========================================================
    */

    document.addEventListener("DOMContentLoaded", () => {

        BelavadosNavigation.init({

            currentQuestion: 1,

            totalQuestions: 20,

            quizMode: "short"

        });

    });

</script>

<style>

    /*
    =========================================================
    ROOT
    =========================================================
    */

    .bv-navigation-shell {

        width: 100%;

        display: flex;

        justify-content: space-between;

        align-items: center;

        gap: 20px;

        padding: 18px 22px;

        border-radius: 18px;

        background:
            linear-gradient(
                180deg,
                rgba(26, 22, 18, 0.96),
                rgba(12, 10, 9, 0.98)
            );

        border: 1px solid
            rgba(161, 122, 71, 0.28);

        box-shadow:
            inset 0 0 18px rgba(255,140,0,0.04),
            0 0 25px rgba(0,0,0,0.4);

        position: relative;

        overflow: hidden;

    }

    /*
    =========================================================
    SECTIONS
    =========================================================
    */

    .bv-navigation-left,
    .bv-navigation-right {

        display: flex;

        align-items: center;

        gap: 12px;

        flex-wrap: wrap;

    }

    .bv-navigation-center {

        flex: 1;

        display: flex;

        justify-content: center;

    }

    /*
    =========================================================
    STATUS PANEL
    =========================================================
    */

    .bv-nav-status-core {

        min-width: 280px;

        padding: 12px 18px;

        border-radius: 14px;

        background:
            linear-gradient(
                180deg,
                rgba(40, 33, 27, 0.96),
                rgba(22, 18, 14, 0.96)
            );

        border: 1px solid
            rgba(184, 136, 75, 0.22);

        text-align: center;

    }

    .bv-nav-status-top {

        display: flex;

        justify-content: space-between;

        align-items: center;

        gap: 14px;

        margin-bottom: 8px;

    }

    .bv-nav-status-label {

        color: rgba(220,210,195,0.72);

        font-size: 11px;

        letter-spacing: 2px;

    }

    .bv-nav-mode {

        color: #e0b87a;

        font-weight: 700;

        font-size: 13px;

    }

    .bv-nav-stage {

        color: rgba(228,220,210,0.92);

        font-size: 14px;

    }

    #nav-current-stage {

        color: #ffcb82;

    }

    /*
    =========================================================
    BUTTONS
    =========================================================
    */

    .bv-nav-button {

        border: none;

        cursor: pointer;

        display: flex;

        align-items: center;

        justify-content: center;

        gap: 10px;

        padding: 14px 18px;

        border-radius: 14px;

        font-size: 14px;

        font-weight: 700;

        letter-spacing: 0.4px;

        transition:
            transform 180ms ease,
            opacity 180ms ease,
            background 180ms ease,
            box-shadow 180ms ease;

        user-select: none;

    }

    .bv-nav-button:hover {

        transform: translateY(-2px);

    }

    .bv-nav-button:active {

        transform: translateY(1px);

    }

    .bv-nav-button:disabled {

        opacity: 0.4;

        cursor: not-allowed;

        transform: none;

    }

    /*
    =========================================================
    BUTTON TYPES
    =========================================================
    */

    .bv-nav-home {

        background:
            linear-gradient(
                180deg,
                #37281d,
                #211712
            );

        color: #d8c2a3;

        border: 1px solid
            rgba(176,135,90,0.3);

    }

    .bv-nav-secondary {

        background:
            linear-gradient(
                180deg,
                #463221,
                #2a1e15
            );

        color: #ead7bb;

    }

    .bv-nav-warning {

        background:
            linear-gradient(
                180deg,
                #5f4318,
                #3b2911
            );

        color: #ffd18f;

    }

    .bv-nav-primary {

        background:
            linear-gradient(
                180deg,
                #b86a21,
                #8a4b17
            );

        color: #fff3e0;

        box-shadow:
            0 0 18px rgba(255,140,0,0.18);

    }

    .bv-nav-finish {

        background:
            linear-gradient(
                180deg,
                #d8842a,
                #9f5715
            );

        color: #fff4e2;

        box-shadow:
            0 0 24px rgba(255,170,80,0.28);

    }

    /*
    =========================================================
    ICONS
    =========================================================
    */

    .bv-nav-icon {

        font-size: 15px;

        opacity: 0.9;

    }

    /*
    =========================================================
    HIDDEN
    =========================================================
    */

    .hidden {

        display: none !important;

    }

    /*
    =========================================================
    RESPONSIVE
    =========================================================
    */

    @media (max-width: 1200px) {

        .bv-navigation-shell {

            flex-direction: column;

            align-items: stretch;

        }

        .bv-navigation-left,
        .bv-navigation-right {

            justify-content: center;

        }

        .bv-navigation-center {

            order: -1;

        }

    }

    @media (max-width: 768px) {

        .bv-nav-button {

            width: 100%;

        }

        .bv-navigation-left,
        .bv-navigation-right {

            flex-direction: column;

            width: 100%;

        }

        .bv-nav-status-core {

            width: 100%;

            min-width: unset;

        }

        .bv-nav-status-top {

            flex-direction: column;

        }

    }

</style>
